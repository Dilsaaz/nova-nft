<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova NFT</title>
<style>

body{
background:#0b0b0b;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

.header{
background:black;
padding:18px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #333;
}

.container{
padding:20px;
max-width:420px;
margin:auto;
}

.card{
background:#141414;
border-radius:15px;
padding:20px;
margin-top:20px;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.nft-title{
color:#ffd700;
font-size:20px;
margin-bottom:10px;
}

.invest-btn{
background:linear-gradient(90deg,#ffe88a,#ffcc33);
border:none;
padding:12px;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.form{
display:none;
margin-top:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

.address{
background:#111;
padding:10px;
border-radius:8px;
word-break:break-all;
margin-top:10px;
}

.success{
color:#00ff9c;
margin-top:20px;
}

</style>
</head>
<body>
<div class="header">
Nova NFT
</div>
<div class="container">
<div class="card">
<div class="nft-title">
Ecology Finance
</div>
<p>Buy Ecology Finance to activate your wallet withdrawal system.</p>
<p style="color:#ffd700">
Minimum purchase: 3000 USDT
</p>
<button class="invest-btn" onclick="showForm()">
Invest Now
</button>
<div class="form" id="form">
<p>BEP20 USDT Deposit Address</p>
<div class="address">
0xcc24EC6c4E82CA8c0D1f96C71E149a030a4663B8
</div>
<input type="text" placeholder="Enter Username">
<input type="text" placeholder="Enter UID">
<button class="invest-btn" onclick="submitForm()">
Submit
</button>
</div>
<p id="msg" class="success"></p>
</div>
</div>
<script>

function showForm(){
document.getElementById("form").style.display="block";
}

function submitForm(){
document.getElementById("msg").innerHTML =
"Successfully! Ecology Finance buy ho chuki hai. 3-4 days me update ho kar wallet me working start ho jayegi.";
}

</script>
</body>
</html>
:::
