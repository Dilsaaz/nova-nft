<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova NFT</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

.header{
background:black;
padding:15px;
border-bottom:1px solid #333;
}

.logo{
width:120px;
}

.container{
padding:20px;
max-width:420px;
margin:auto;
}

.card{
background:#141414;
border-radius:15px;
padding:20px;
margin-top:20px;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.nft-title{
color:#ffd700;
font-size:20px;
margin-bottom:10px;
}

.btn{
background:linear-gradient(90deg,#ffe88a,#ffcc33);
border:none;
padding:12px;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.copy-btn{
background:#222;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.form{
display:none;
margin-top:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

.address{
background:#111;
padding:10px;
border-radius:8px;
word-break:break-all;
margin-top:10px;
}

.success{
color:#00ff9c;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

</div>

<div class="container">

<div class="card">

<div class="nft-title">
Ecology Finance
</div>

<p>Buy Ecology Finance to activate your wallet withdrawal system.</p>

<p style="color:#ffd700">
Minimum purchase: 3000 USDT
</p>

<button class="btn" id="investBtn" onclick="showForm()">
Invest Now
</button>

<div class="form" id="form">

<p>BEP20 USDT Deposit Address</p>

<div class="address" id="wallet">
0xcc24EC6c4E82CA8c0D1f96C71E149a030a4663B8
</div>

<button class="copy-btn" onclick="copyAddress()">
Copy Address
</button>

<input type="text" placeholder="Enter Username">

<input type="text" placeholder="Enter UID">

<button class="btn" onclick="submitForm()">
Submit
</button>

</div>

<p id="msg" class="success"></p>

</div>

</div>

<script>

function showForm(){

document.getElementById("form").style.display="block";
document.getElementById("investBtn").style.display="none";

}

function copyAddress(){

var text = document.getElementById("wallet").innerText;

navigator.clipboard.writeText(text);

alert("Address copied successfully");

}

function submitForm(){

document.getElementById("msg").innerHTML =
"Successfully! Your Ecology Finance purchase has been submitted. It will be updated in your wallet within 3-4 days.";

}

</script>

</body>
</html>
